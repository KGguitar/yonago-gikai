name: Update members data

on:
  schedule:
    # 毎月1日 00:30 UTC = 09:30 JST
    - cron: '30 0 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write   # コミット & プッシュ
  issues: write     # 失敗時の Issue 作成

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Scrape members
        run: python scripts/scrape.py

      - name: Sync member_links.json
        run: python scripts/sync_links.py --write

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/members.json docs/data/meta.json docs/data/member_links.json
          if git diff --cached --quiet; then
            echo "No data changes; skipping commit."
          else
            git commit -m "chore(data): update members data ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[auto] 議員データ自動更新が失敗 (${today})`,
              body: [
                '自動更新ワークフローが失敗しました。',
                '',
                `- 実行URL: ${runUrl}`,
                `- 日付(UTC): ${today}`,
                '',
                '考えられる原因:',
                '- 米子市公式サイトの構造変更',
                '- ネットワーク障害',
                '- パース結果の異常(議員数が10人未満)',
                '',
                'ログを確認のうえ `scripts/scrape.py` を修正してください。',
                '',
                '_このIssueはGitHub Actionsにより自動作成されました。_',
              ].join('\n'),
            });
